version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: daily
      time: "00:00"
      timezone: Europe/London
    cooldown:
      default-days: 21
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "00:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    cooldown:
      default-days: 21
